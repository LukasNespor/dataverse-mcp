# Azure OBO mode override for local testing.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.azure.yml up -d --build
#
# Prerequisites in Azure Portal (Entra ID → App registrations → your app):
#   1. Authentication → Add platform → Web → Redirect URI: http://localhost:8000/auth/callback
#   2. Expose an API → Set Application ID URI (accept default api://<CLIENT_ID>)
#   3. Expose an API → Add a scope → "mcp-access" (enable for admins and users)
#   4. API permissions → Add → Dynamics CRM → user_impersonation (delegated) → Grant admin consent
#   5. Certificates & secrets → New client secret → copy to .env as CLIENT_SECRET
#
# Required .env variables:
#   DATAVERSE_URL, CLIENT_ID, CLIENT_SECRET, TENANT_ID
#
# After starting, add to Claude Code with:
#   claude mcp add Dataverse --transport http http://localhost:8000/mcp

services:
  dataverse-mcp:
    ports:
      - "8000:8000"
    environment:
      MCP_BASE_URL: "${MCP_BASE_URL:-http://localhost:8000}"
