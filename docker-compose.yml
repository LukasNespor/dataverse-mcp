services:
  dataverse-mcp:
    build: .
    container_name: dataverse-mcp
    depends_on:
      redis:
        condition: service_healthy
    environment:
      # Required: your Dataverse environment URL (no trailing slash)
      - DATAVERSE_URL=${DATAVERSE_URL}
      # Optional: defaults to "common" (works for most single-tenant orgs)
      - TENANT_ID=${TENANT_ID:-common}
      # Required: Azure AD Application (client) ID from your Entra ID app registration
      - CLIENT_ID=${CLIENT_ID}
      # Required: Azure AD Application (client) secret from your Entra ID app registration
      - CLIENT_SECRET=${CLIENT_SECRET}
      # Public URL for OAuth redirect
      - MCP_BASE_URL=${MCP_BASE_URL:-http://localhost:8000}
      # Stable keys for session persistence (optional, but required for restart survival)
      - JWT_SIGNING_KEY=${JWT_SIGNING_KEY:-}
      - STORAGE_ENCRYPTION_KEY=${STORAGE_ENCRYPTION_KEY:-}
      # Redis for shared cache and proposal storage
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dataverse-redis
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save "60 1"
      --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
